<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fila de Espera · ReserveX · Jimmy's</title>
  <link rel="stylesheet" href="assets/styles.css?v=3">
  <script>
    window.addEventListener('error', function(e) { alert('ERRO JS: ' + e.message + '\nLinha: ' + (e.lineno || '?')); });
    window.addEventListener('unhandledrejection', function(e) { alert('PROMISE ERRO: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason))); });
  </script>
  <style>
    .fila-card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-sm); display: flex; gap: var(--space-md); align-items: center; }
    .fila-card.aguardando { border-left: 4px solid var(--color-red); }
    .fila-card.chamado { border-left: 4px solid var(--color-gold); background: rgba(201, 151, 60, 0.06); }
    .fila-pos { font-family: var(--font-display); font-size: 1.75rem; color: var(--color-gold); width: 50px; text-align: center; line-height: 1; }
    .fila-pos sup { font-size: 0.8125rem; }
    .fila-info { flex: 1; min-width: 0; }
    .fila-nome { font-family: var(--font-display); color: var(--color-cream); font-size: 1.125rem; margin-bottom: 4px; letter-spacing: 0.03em; }
    .fila-meta { display: flex; gap: var(--space-md); font-size: 0.8125rem; color: var(--text-muted); flex-wrap: wrap; }
    .fila-meta .tempo-alto { color: var(--color-error); font-weight: 600; }
    .fila-meta .tempo-medio { color: var(--color-warning); }
    .fila-acoes { display: flex; flex-direction: column; gap: 4px; min-width: 110px; }
    .fila-acoes .btn { font-size: 0.75rem; padding: 6px 10px; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-sm); margin-bottom: var(--space-lg); }
    @media (min-width: 600px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
    .stat-pill { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 12px; text-align: center; }
    .stat-pill-v { font-family: var(--font-display); font-size: 1.5rem; line-height: 1; color: var(--color-cream); }
    .stat-pill-l { font-size: 0.625rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .empty { text-align: center; padding: var(--space-2xl) var(--space-md); color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: var(--space-md); opacity: 0.4; }
    .modal-backdrop { position: fixed; top:0;right:0;bottom:0;left:0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal-backdrop.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-top: 3px solid var(--color-red); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: var(--space-lg); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); padding-bottom: var(--space-md); border-bottom: 1px solid var(--border-default); }
    .modal-title { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-cream); }
    .close-btn { background: var(--bg-tertiary); border: none; color: var(--text-secondary); width: 36px; height: 36px; border-radius: var(--radius-full); cursor: pointer; font-size: 1.25rem; }
    .setor-grupo { margin-bottom: var(--space-md); }
    .setor-titulo { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-gold); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .setor-pill { width: 10px; height: 10px; border-radius: 50%; }
    .mesa-grid-pick { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
    .mesa-opt { padding: 10px 4px; background: var(--bg-tertiary); border: 2px solid var(--border-default); border-radius: var(--radius-md); cursor: pointer; text-align: center; }
    .mesa-opt:active { transform: scale(0.97); }
    .mesa-opt.ideal { border-color: var(--color-green); background: rgba(42, 171, 71, 0.08); }
    .mesa-opt.apertado { border-color: var(--color-warning); background: rgba(201, 151, 60, 0.06); }
    .mesa-opt.sel { border-color: var(--color-gold) !important; background: rgba(201, 151, 60, 0.25) !important; }
    .mesa-opt-nome { font-family: var(--font-display); font-size: 1.25rem; color: var(--color-cream); line-height: 1; }
    .mesa-opt-cap { font-size: 0.625rem; color: var(--text-muted); margin-top: 4px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="home.html" class="brand">
        <div class="brand-logo">JIMMY<strong>'S</strong></div>
        <span class="brand-badge">v1.1</span>
      </a>
      <div class="user-menu">
        <a href="home.html" class="btn btn-ghost btn-sm">← Voltar</a>
      </div>
    </div>
  </header>
  <main class="container fade-in">
    <h1 style="font-family: var(--font-display); margin-bottom: var(--space-sm);">🕐 Fila de Espera</h1>
    <p class="text-secondary" style="margin-bottom: var(--space-lg);">Quem chegou e tá aguardando mesa.</p>

    <div class="stats-row">
      <div class="stat-pill"><div class="stat-pill-v" id="s-ag">—</div><div class="stat-pill-l">Aguardando</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-ch">—</div><div class="stat-pill-l">Chamados</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-pp">—</div><div class="stat-pill-l">Pessoas total</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-tm">—</div><div class="stat-pill-l">Espera média</div></div>
    </div>

    <div class="toolbar">
      <button type="button" class="btn btn-primary" id="btn-add">+ Adicionar à Fila</button>
      <button type="button" class="btn btn-ghost btn-sm" id="btn-refresh">↻</button>
    </div>

    <div id="lista-fila"></div>
  </main>

  <div class="modal-backdrop" id="modal-add">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">+ Adicionar à Fila</div><button type="button" class="close-btn" id="btn-fechar-add">✕</button></div>
      <div class="form-group"><label class="form-label">Nome *</label><input type="text" id="f-nome" class="form-input" placeholder="Nome do cliente"></div>
      <div class="form-group"><label class="form-label">Telefone *</label><input type="tel" id="f-tel" class="form-input" inputmode="numeric" placeholder="(43) 99999-9999"></div>
      <div class="row-2">
        <div class="form-group"><label class="form-label">Pessoas *</label><input type="number" id="f-pessoas" class="form-input" inputmode="numeric" min="1" value="2"></div>
        <div class="form-group"><label class="form-label">Espera (min)</label><input type="number" id="f-tempo" class="form-input" inputmode="numeric" min="0" value="15"></div>
      </div>
      <div class="form-group"><label class="form-label">Observações</label><textarea id="f-obs" class="form-textarea" placeholder="Aniversário, mesa de canto..."></textarea></div>
      <button type="button" class="btn btn-primary btn-block" id="btn-criar">+ Adicionar</button>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-mesa-pick">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">🪑 Alocar Mesa</div><button type="button" class="close-btn" id="btn-fechar-mp">✕</button></div>
      <div id="mp-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js?v=3"></script>
  <script>
(function(){
  try {
    var admin = exigirLogin();
    if (!admin) return;

    var filaCache = [];
    var mesasCache = [];
    var setoresCache = [];
    var modalAdd = document.getElementById('modal-add');
    var modalMesaPick = document.getElementById('modal-mesa-pick');
    var mesaPickerCallback = null;
    var mesaPickerSelecionada = null;
    var mesaPickerQtd = 1;
    var filaSelecionada = null;

    function escapeHtml(s){if(s==null)return ''; return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function aplicarMascaraTel(input){input.addEventListener('input',function(){var v=input.value.replace(/\D/g,'').slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;input.value=v;});}

    function tempoEspera(chegou) {
      var ms = Date.now() - new Date(chegou).getTime();
      var min = Math.floor(ms / 60000);
      if (min < 60) return { txt: min + 'MIN', classe: min > 30 ? 'tempo-alto' : (min > 15 ? 'tempo-medio' : '') };
      var h = Math.floor(min / 60);
      var m = min % 60;
      return { txt: h + 'H ' + m + 'M', classe: 'tempo-alto' };
    }

    async function carregar() {
      try {
        var s = await sb.from('setores').select('*').eq('tenant_id', TENANT_ID).eq('ativo', true).order('ordem');
        if (s.error) throw new Error(s.error.message);
        setoresCache = s.data || [];

        var m = await sb.from('mesas').select('*').eq('tenant_id', TENANT_ID).eq('ativa', true).order('nome');
        if (m.error) throw new Error(m.error.message);
        mesasCache = m.data || [];

        var f = await sb.from('fila_espera')
          .select('*')
          .eq('tenant_id', TENANT_ID)
          .in('status', ['aguardando', 'chamado'])
          .order('created_at', { ascending: true });
        if (f.error) throw new Error(f.error.message);
        filaCache = f.data || [];

        renderizar();
      } catch(err) { alert('Erro: ' + err.message); }
    }

    function renderizar() {
      var ag = filaCache.filter(function(f){return f.status === 'aguardando';});
      var ch = filaCache.filter(function(f){return f.status === 'chamado';});
      var totPessoas = filaCache.reduce(function(a,b){return a + (b.qtd_pessoas||0);}, 0);
      var totMin = 0, count = 0;
      filaCache.forEach(function(f){
        var ms = Date.now() - new Date(f.created_at).getTime();
        totMin += Math.floor(ms / 60000); count++;
      });
      var media = count > 0 ? Math.floor(totMin / count) : 0;
      var mediaTxt = '—';
      if (count > 0) {
        if (media < 60) mediaTxt = media + 'MIN';
        else mediaTxt = Math.floor(media/60) + 'H ' + (media%60) + 'M';
      }

      document.getElementById('s-ag').textContent = ag.length;
      document.getElementById('s-ch').textContent = ch.length;
      document.getElementById('s-pp').textContent = totPessoas;
      document.getElementById('s-tm').textContent = mediaTxt;

      var el = document.getElementById('lista-fila');
      if (filaCache.length === 0) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">🕐</div><p>Fila vazia.</p><p style="font-size:0.875rem;margin-top:8px;">Quando chegar gente sem reserva, adiciona aqui.</p></div>';
        return;
      }

      var html = '';
      filaCache.forEach(function(f, idx){
        var t = tempoEspera(f.created_at);
        var statusBadge = f.status === 'chamado' ? ' <span class="badge badge-gold" style="font-size:0.6875rem;vertical-align:middle;margin-left:4px;">📞 chamado</span>' : '';
        html += '<div class="fila-card ' + f.status + '">' +
          '<div class="fila-pos">' + (idx+1) + '<sup>º</sup></div>' +
          '<div class="fila-info">' +
            '<div class="fila-nome">' + escapeHtml(f.nome_completo) + statusBadge + '</div>' +
            '<div class="fila-meta">' +
              '<span>👥 ' + f.qtd_pessoas + '</span>' +
              '<span>📞 ' + fmtTelefone(f.telefone) + '</span>' +
              '<span class="' + t.classe + '">⏱ ' + t.txt + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="fila-acoes">' +
            (f.status === 'aguardando' ? '<button type="button" class="btn btn-gold btn-sm" data-chamar="' + f.id + '">📞 Chamar</button>' : '') +
            '<button type="button" class="btn btn-primary btn-sm" data-alocar="' + f.id + '">🪑 Alocar</button>' +
            '<button type="button" class="btn btn-ghost btn-sm" data-desistiu="' + f.id + '">✗ Desistiu</button>' +
          '</div>' +
        '</div>';
      });
      el.innerHTML = html;

      Array.prototype.forEach.call(el.querySelectorAll('button[data-chamar]'), function(b){
        b.addEventListener('click', function(){ chamar(b.dataset.chamar); });
      });
      Array.prototype.forEach.call(el.querySelectorAll('button[data-alocar]'), function(b){
        b.addEventListener('click', function(){ alocar(b.dataset.alocar); });
      });
      Array.prototype.forEach.call(el.querySelectorAll('button[data-desistiu]'), function(b){
        b.addEventListener('click', function(){ desistir(b.dataset.desistiu); });
      });
    }

    async function chamar(id) {
      var f = filaCache.find(function(x){return x.id === id;});
      if (!f) return;
      var primeiroNome = (f.nome_completo || '').split(' ')[0];
      var msg = 'JIMMY\'S Bar 🇺🇸🔥\n\n' +
                'Olá ' + primeiroNome + '! 🍻\n\n' +
                'Sua mesa tá liberada!\n' +
                'Vem até o balcão que vamos te acompanhar até a sua mesa.\n\n' +
                '📍 @jimmys.londrina\n' +
                'Jimmy\'s Bar · Londrina PR';
      var tel = (f.telefone || '').replace(/\D/g, '');
      var telWA = tel.length >= 10 ? '55' + tel : '';
      var url = 'https://wa.me/' + telWA + '?text=' + encodeURIComponent(msg);
      window.open(url, '_blank');

      var resp = await sb.from('fila_espera').update({
        status: 'chamado',
        chamado_em: new Date().toISOString()
      }).eq('id', id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast('Cliente chamado ✓', 'success');
      carregar();
    }

    async function alocar(id) {
      filaSelecionada = filaCache.find(function(x){return x.id === id;});
      if (!filaSelecionada) return;
      mesaPickerSelecionada = null;
      mesaPickerQtd = filaSelecionada.qtd_pessoas || 1;
      mesaPickerCallback = function(mesaId){
        if (!mesaId) { toast('Escolhe uma mesa', 'error'); return; }
        sentarComMesa(mesaId);
      };
      modalMesaPick.classList.add('active');
      await renderizarMesaPicker();
    }

    async function renderizarMesaPicker() {
      var el = document.getElementById('mp-body');
      el.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto;"></div></div>';
      var hoje = hojeISO();
      var r = await sb.from('reservas').select('mesa_id').eq('tenant_id', TENANT_ID).eq('data', hoje).in('status', ['pendente','confirmada','em_uso']);
      var ocupadas = (r.data || []).filter(function(x){return x.mesa_id;}).map(function(x){return x.mesa_id;});

      var html = '<p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:var(--space-md);">Mesa pra <strong>' + escapeHtml(filaSelecionada.nome_completo) + '</strong> · <strong>' + mesaPickerQtd + ' pessoa(s)</strong></p>';
      var temAlguma = false;

      setoresCache.forEach(function(s){
        var mesasSetor = mesasCache.filter(function(m){
          return m.setor_id === s.id && ocupadas.indexOf(m.id) < 0 && m.status !== 'bloqueada';
        });
        mesasSetor.sort(function(a,b){
          var aIdeal = a.capacidade >= mesaPickerQtd ? 0 : 1;
          var bIdeal = b.capacidade >= mesaPickerQtd ? 0 : 1;
          if (aIdeal !== bIdeal) return aIdeal - bIdeal;
          return (a.nome || '').localeCompare(b.nome || '');
        });
        if (mesasSetor.length === 0) return;
        temAlguma = true;
        html += '<div class="setor-grupo"><div class="setor-titulo"><span class="setor-pill" style="background:' + s.cor + '"></span>' + escapeHtml(s.nome) + '</div><div class="mesa-grid-pick">';
        mesasSetor.forEach(function(m){
          var classe = m.capacidade >= mesaPickerQtd ? 'ideal' : 'apertado';
          html += '<div class="mesa-opt ' + classe + '" data-id="' + m.id + '"><div class="mesa-opt-nome">' + escapeHtml(m.nome) + '</div><div class="mesa-opt-cap">' + m.capacidade + 'p</div></div>';
        });
        html += '</div></div>';
      });

      if (!temAlguma) html += '<div class="alert alert-warning" style="font-size:0.875rem;">Nenhuma mesa disponível agora.</div>';
      html += '<div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg);">' +
        '<button type="button" class="btn btn-primary" id="mp-confirmar" style="flex:1;">✓ Sentar</button>' +
        '<button type="button" class="btn btn-ghost" id="mp-cancelar">Cancelar</button>' +
      '</div>';

      el.innerHTML = html;
      Array.prototype.forEach.call(document.querySelectorAll('.mesa-opt'), function(elm){
        elm.addEventListener('click', function(){
          Array.prototype.forEach.call(document.querySelectorAll('.mesa-opt'), function(x){ x.classList.remove('sel'); });
          elm.classList.add('sel');
          mesaPickerSelecionada = elm.dataset.id;
        });
      });
      document.getElementById('mp-confirmar').addEventListener('click', function(){
        modalMesaPick.classList.remove('active');
        if (mesaPickerCallback) mesaPickerCallback(mesaPickerSelecionada);
      });
      document.getElementById('mp-cancelar').addEventListener('click', function(){
        modalMesaPick.classList.remove('active');
      });
    }

    async function sentarComMesa(mesaId) {
      try {
        var f = filaSelecionada;
        var hoje = hojeISO();
        var tel = (f.telefone || '').replace(/\D/g, '');
        var clienteId = null;
        if (tel) {
          var pc = await sb.from('clientes').select('id').eq('tenant_id', TENANT_ID).eq('telefone', tel).maybeSingle();
          if (pc.data) clienteId = pc.data.id;
        }
        if (!clienteId) {
          var nc = await sb.from('clientes').insert({
            tenant_id: TENANT_ID, nome_completo: f.nome_completo,
            telefone: tel || null, origem: 'walk_in'
          }).select('id').maybeSingle();
          if (nc.error && nc.error.code !== '23505') throw new Error(nc.error.message);
          clienteId = nc.data ? nc.data.id : null;
        }

        var r = await sb.from('reservas').insert({
          tenant_id: TENANT_ID, cliente_id: clienteId, data: hoje,
          qtd_pessoas: f.qtd_pessoas, status: 'em_uso', origem: 'walk_in',
          mesa_id: mesaId, observacoes: f.observacoes || null,
          criada_por: admin.id, confirmada_por: admin.id
        }).select('id').maybeSingle();
        if (r.error) throw new Error(r.error.message);

        var u = await sb.from('fila_espera').update({
          status: 'sentado', sentado_em: new Date().toISOString(),
          reserva_id: r.data.id
        }).eq('id', f.id);
        if (u.error) throw new Error(u.error.message);

        toast('Cliente sentado ✓ Reserva criada', 'success');
        carregar();
      } catch(err) { toast('Erro: ' + err.message, 'error'); }
    }

    async function desistir(id) {
      if (!confirm('Marcar como desistente? Sai da fila ativa.')) return;
      var resp = await sb.from('fila_espera').update({ status: 'desistiu' }).eq('id', id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast('Cliente desistiu', 'success');
      carregar();
    }

    function abrirAdd() {
      document.getElementById('f-nome').value = '';
      document.getElementById('f-tel').value = '';
      document.getElementById('f-pessoas').value = 2;
      document.getElementById('f-tempo').value = 15;
      document.getElementById('f-obs').value = '';
      modalAdd.classList.add('active');
    }

    async function criarFila() {
      try {
        var nome = document.getElementById('f-nome').value.trim();
        var tel = document.getElementById('f-tel').value.replace(/\D/g, '');
        var pessoas = parseInt(document.getElementById('f-pessoas').value, 10);
        var tempo = parseInt(document.getElementById('f-tempo').value, 10) || 0;
        var obs = document.getElementById('f-obs').value.trim();

        if (!nome || nome.length < 2) { toast('Nome obrigatório', 'error'); return; }
        if (!tel || tel.length < 10) { toast('Telefone inválido', 'error'); return; }
        if (!pessoas || pessoas < 1) { toast('Pessoas inválido', 'error'); return; }

        var resp = await sb.from('fila_espera').insert({
          tenant_id: TENANT_ID, nome_completo: nome, telefone: tel,
          qtd_pessoas: pessoas, tempo_estimado_min: tempo, status: 'aguardando',
          observacoes: obs || null, criado_por: admin.id
        });
        if (resp.error) throw new Error(resp.error.message);
        toast('Adicionado à fila ✓', 'success');
        modalAdd.classList.remove('active');
        carregar();
      } catch(err) { toast('Erro: ' + err.message, 'error'); }
    }

    document.getElementById('btn-add').addEventListener('click', abrirAdd);
    document.getElementById('btn-refresh').addEventListener('click', carregar);
    document.getElementById('btn-criar').addEventListener('click', criarFila);
    document.getElementById('btn-fechar-add').addEventListener('click', function(){ modalAdd.classList.remove('active'); });
    document.getElementById('btn-fechar-mp').addEventListener('click', function(){ modalMesaPick.classList.remove('active'); });
    modalAdd.addEventListener('click', function(e){ if (e.target === modalAdd) modalAdd.classList.remove('active'); });
    modalMesaPick.addEventListener('click', function(e){ if (e.target === modalMesaPick) modalMesaPick.classList.remove('active'); });
    aplicarMascaraTel(document.getElementById('f-tel'));

    setInterval(function(){ if (filaCache.length > 0) renderizar(); }, 30000);

    carregar();
  } catch(err) { alert('Erro fatal: ' + err.message); }
})();
  </script>
</body>
</html>
