<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Lote · ReserveX · Jimmy's</title>
  <link rel="stylesheet" href="assets/styles.css?v=2">
  <script>
    window.addEventListener('error', function(e) { alert('ERRO JS: ' + e.message + '\nLinha: ' + (e.lineno || '?')); });
    window.addEventListener('unhandledrejection', function(e) { alert('PROMISE ERRO: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason))); });
  </script>
  <style>
    .info-box { background: var(--bg-secondary); border: 1px solid var(--border-default); border-top: 3px solid var(--color-red); border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-lg); }
    .info-titulo { font-family: var(--font-display); color: var(--color-cream); font-size: 1.5rem; margin-bottom: 8px; }
    .info-meta { display: flex; gap: var(--space-md); font-size: 0.875rem; color: var(--text-muted); flex-wrap: wrap; }
    .progresso-box { margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px solid var(--border-default); }
    .progresso-bar { height: 10px; background: var(--bg-tertiary); border-radius: 5px; overflow: hidden; margin-top: 8px; }
    .progresso-fill { height: 100%; background: linear-gradient(90deg, var(--color-success), var(--color-gold)); transition: width 0.3s; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-sm); margin-bottom: var(--space-lg); }
    @media (min-width: 600px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
    .stat-card-l { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-md); text-align: center; }
    .stat-card-l.gold { border-top: 3px solid var(--color-gold); }
    .stat-card-l.green { border-top: 3px solid var(--color-success); }
    .stat-card-l.blue { border-top: 3px solid var(--color-info); }
    .stat-card-l.gray { border-top: 3px solid #555; }
    .stat-v { font-family: var(--font-display); font-size: 1.75rem; line-height: 1; color: var(--color-cream); }
    .stat-l { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .filter-chips { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); overflow-x: auto; }
    .chip { padding: 6px 14px; border-radius: var(--radius-full); background: var(--bg-tertiary); border: 1px solid var(--border-default); color: var(--text-secondary); font-size: 0.8125rem; cursor: pointer; white-space: nowrap; }
    .chip.active { background: var(--color-red); color: #fff; border-color: var(--color-red); }
    .convite-card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: 8px; display: flex; gap: var(--space-md); align-items: center; }
    .convite-card.disponivel { border-left: 3px solid #555; }
    .convite-card.usado { border-left: 3px solid var(--color-success); background: rgba(45,106,79,0.05); }
    .convite-card.cancelado { border-left: 3px solid var(--color-error); opacity: 0.6; }
    .convite-num { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-gold); width: 50px; text-align: center; }
    .convite-info { flex: 1; min-width: 0; }
    .convite-status-line { font-size: 0.875rem; color: var(--color-cream); font-weight: 600; }
    .convite-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; word-break: break-all; }
    .convite-acoes { display: flex; flex-direction: column; gap: 4px; }
    .modal-backdrop { position: fixed; top:0;right:0;bottom:0;left:0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal-backdrop.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-top: 3px solid var(--color-red); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: var(--space-lg); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); padding-bottom: var(--space-md); border-bottom: 1px solid var(--border-default); }
    .modal-title { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-cream); }
    .close-btn { background: var(--bg-tertiary); border: none; color: var(--text-secondary); width: 36px; height: 36px; border-radius: var(--radius-full); cursor: pointer; font-size: 1.25rem; }
    .links-textarea { width: 100%; min-height: 220px; background: var(--bg-tertiary); border: 1px dashed var(--color-gold); border-radius: var(--radius-md); padding: var(--space-md); color: var(--color-cream); font-size: 0.8125rem; font-family: monospace; resize: vertical; word-break: break-all; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="home.html" class="brand">
        <div class="brand-logo">JIMMY<strong>'S</strong></div>
        <span class="brand-badge">v1.0</span>
      </a>
      <div class="user-menu">
        <a href="lotes.html" class="btn btn-ghost btn-sm">← Lotes</a>
      </div>
    </div>
  </header>
  <main class="container fade-in">
    <div id="conteudo"><div class="empty"><div class="spinner" style="margin:0 auto;"></div></div></div>
  </main>

  <div class="modal-backdrop" id="modal-links">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">📋 Copiar Todos os Links</div><button type="button" class="close-btn" id="btn-fechar-links">✕</button></div>
      <p class="text-secondary" style="font-size:0.875rem;margin-bottom:var(--space-md);">Copia tudo e cola no WhatsApp / Insta. Cada linha é um link único.</p>
      <textarea class="links-textarea" id="links-area" readonly></textarea>
      <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md);">
        <button type="button" class="btn btn-gold" id="btn-copiar-todos" style="flex:1;">📋 Copiar Tudo</button>
        <button type="button" class="btn btn-secondary" id="btn-whatsapp-todos">💬 WhatsApp</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js?v=2"></script>
  <script>
(function(){
  try {
    var admin = exigirLogin();
    if (!admin) return;

    var loteId = new URLSearchParams(window.location.search).get('id');
    if (!loteId) { document.getElementById('conteudo').innerHTML = '<div class="alert alert-error">ID do lote não fornecido.</div>'; return; }

    var lote = null;
    var convitesCache = [];
    var filtroAtivo = 'todos';
    var modalLinks = document.getElementById('modal-links');

    function escapeHtml(s){if(s==null)return ''; return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

    function urlConvite(token) {
      return window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'cadastro.html?token=' + token;
    }

    async function carregar() {
      try {
        var l = await sb.from('lotes').select('*, eventos(nome)').eq('id', loteId).eq('tenant_id', TENANT_ID).maybeSingle();
        if (l.error) throw new Error(l.error.message);
        if (!l.data) { document.getElementById('conteudo').innerHTML = '<div class="alert alert-error">Lote não encontrado.</div>'; return; }
        lote = l.data;

        var c = await sb.from('convites')
          .select('*, reservas(qtd_pessoas, status, clientes(nome_completo, telefone))')
          .eq('lote_id', loteId)
          .order('numero_convite', { ascending: true });
        if (c.error) throw new Error(c.error.message);
        convitesCache = c.data || [];

        renderizar();
      } catch(err) { document.getElementById('conteudo').innerHTML = '<div class="alert alert-error">' + err.message + '</div>'; }
    }

    function renderizar() {
      var disponiveis = convitesCache.filter(function(c){return c.status === 'disponivel';}).length;
      var usados = convitesCache.filter(function(c){return c.status === 'usado';}).length;
      var cancelados = convitesCache.filter(function(c){return c.status === 'cancelado';}).length;
      var perc = lote.total_convites > 0 ? Math.round((usados / lote.total_convites) * 100) : 0;

      var statusBadge = lote.status === 'ativo' ? 'green' : lote.status === 'cancelado' ? 'red' : 'gray';

      var infoHtml = '<div class="info-box">' +
        '<div class="info-titulo">' + escapeHtml(lote.nome) + ' <span class="badge badge-' + statusBadge + '" style="font-size:0.6875rem;vertical-align:middle;margin-left:8px;">' + lote.status + '</span></div>' +
        '<div class="info-meta">' +
          '<span>📅 ' + fmtData(lote.data_evento) + '</span>' +
          (lote.eventos ? '<span>🎤 ' + escapeHtml(lote.eventos.nome) + '</span>' : '') +
          (lote.expira_em ? '<span>⏰ Expira ' + fmtData(lote.expira_em.split('T')[0]) + '</span>' : '<span>♾️ Sem validade</span>') +
        '</div>' +
        (lote.descricao ? '<div style="font-size:0.875rem;color:var(--text-secondary);margin-top:8px;">' + escapeHtml(lote.descricao) + '</div>' : '') +
        '<div class="progresso-box">' +
          '<div style="display:flex;justify-content:space-between;font-size:0.875rem;color:var(--text-secondary);">' +
            '<span>Usados: <strong style="color:var(--color-cream);">' + usados + ' / ' + lote.total_convites + '</strong></span>' +
            '<span style="color:var(--color-gold);">' + perc + '%</span>' +
          '</div>' +
          '<div class="progresso-bar"><div class="progresso-fill" style="width:' + perc + '%"></div></div>' +
        '</div>' +
      '</div>';

      var statsHtml = '<div class="stats-row">' +
        '<div class="stat-card-l gold"><div class="stat-v">' + lote.total_convites + '</div><div class="stat-l">Total</div></div>' +
        '<div class="stat-card-l gray"><div class="stat-v">' + disponiveis + '</div><div class="stat-l">Disponíveis</div></div>' +
        '<div class="stat-card-l green"><div class="stat-v">' + usados + '</div><div class="stat-l">Usados</div></div>' +
        '<div class="stat-card-l blue"><div class="stat-v">' + cancelados + '</div><div class="stat-l">Cancelados</div></div>' +
      '</div>';

      var toolbarHtml = '<div class="toolbar">' +
        '<button type="button" class="btn btn-gold" id="btn-copiar-massa">📋 Copiar Todos os Links</button>' +
        '<button type="button" class="btn btn-secondary" id="btn-csv">📥 CSV</button>' +
        '<button type="button" class="btn btn-ghost btn-sm" id="btn-refresh">↻</button>' +
      '</div>';

      var filtrados = convitesCache;
      if (filtroAtivo === 'disponivel') filtrados = filtrados.filter(function(c){return c.status === 'disponivel';});
      else if (filtroAtivo === 'usado') filtrados = filtrados.filter(function(c){return c.status === 'usado';});
      else if (filtroAtivo === 'cancelado') filtrados = filtrados.filter(function(c){return c.status === 'cancelado';});

      var chipsHtml = '<div class="filter-chips" id="chips">' +
        '<span class="chip ' + (filtroAtivo === 'todos' ? 'active' : '') + '" data-filtro="todos">Todos (' + convitesCache.length + ')</span>' +
        '<span class="chip ' + (filtroAtivo === 'disponivel' ? 'active' : '') + '" data-filtro="disponivel">Disponíveis (' + disponiveis + ')</span>' +
        '<span class="chip ' + (filtroAtivo === 'usado' ? 'active' : '') + '" data-filtro="usado">Usados (' + usados + ')</span>' +
        '<span class="chip ' + (filtroAtivo === 'cancelado' ? 'active' : '') + '" data-filtro="cancelado">Cancelados (' + cancelados + ')</span>' +
      '</div>';

      var listaHtml = '';
      filtrados.forEach(function(c){
        var nome = '';
        var tel = '';
        var qtd = '';
        if (c.reservas && c.reservas.clientes) {
          nome = c.reservas.clientes.nome_completo;
          tel = fmtTelefone(c.reservas.clientes.telefone);
          qtd = c.reservas.qtd_pessoas;
        }
        var statusInfo = c.status === 'disponivel'
          ? '<div class="convite-status-line">⚪ Disponível</div><div class="convite-meta">' + escapeHtml(urlConvite(c.token)) + '</div>'
          : c.status === 'usado'
            ? '<div class="convite-status-line">✓ ' + escapeHtml(nome) + (qtd ? ' · ' + qtd + 'p' : '') + '</div><div class="convite-meta">' + (tel ? '📞 ' + tel : '') + ' · usado em ' + fmtDataHora(c.usado_em) + '</div>'
            : '<div class="convite-status-line">✗ Cancelado</div>';

        var acoesHtml = '';
        if (c.status === 'disponivel') {
          acoesHtml = '<button type="button" class="btn btn-gold btn-sm" data-copy="' + c.token + '">📋</button>' +
                      '<button type="button" class="btn btn-ghost btn-sm" data-cancel="' + c.id + '">✗</button>';
        }

        listaHtml += '<div class="convite-card ' + c.status + '">' +
          '<div class="convite-num">#' + c.numero_convite + '</div>' +
          '<div class="convite-info">' + statusInfo + '</div>' +
          (acoesHtml ? '<div class="convite-acoes">' + acoesHtml + '</div>' : '') +
        '</div>';
      });

      if (filtrados.length === 0) {
        listaHtml = '<div class="empty"><div class="empty-icon">🎟️</div><p>Nenhum convite ' + (filtroAtivo !== 'todos' ? filtroAtivo : '') + '.</p></div>';
      }

      document.getElementById('conteudo').innerHTML = infoHtml + statsHtml + toolbarHtml + chipsHtml + listaHtml;

      document.getElementById('btn-copiar-massa').addEventListener('click', abrirModalLinks);
      document.getElementById('btn-csv').addEventListener('click', exportarCSV);
      document.getElementById('btn-refresh').addEventListener('click', carregar);

      Array.prototype.forEach.call(document.querySelectorAll('#chips .chip'), function(chip){
        chip.addEventListener('click', function(){
          filtroAtivo = chip.dataset.filtro;
          renderizar();
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll('button[data-copy]'), function(b){
        b.addEventListener('click', function(){
          navigator.clipboard.writeText(urlConvite(b.dataset.copy));
          b.textContent = '✓';
          setTimeout(function(){ b.textContent = '📋'; }, 1500);
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll('button[data-cancel]'), function(b){
        b.addEventListener('click', function(){ cancelarConvite(b.dataset.cancel); });
      });
    }

    function abrirModalLinks() {
      var disponiveis = convitesCache.filter(function(c){return c.status === 'disponivel';});
      var linhas = disponiveis.map(function(c){ return '#' + c.numero_convite + ' → ' + urlConvite(c.token); });
      document.getElementById('links-area').value = linhas.join('\n');
      modalLinks.classList.add('active');
    }

    function copiarTodosLinks() {
      var area = document.getElementById('links-area');
      navigator.clipboard.writeText(area.value);
      var btn = document.getElementById('btn-copiar-todos');
      btn.textContent = '✓ Copiado!';
      setTimeout(function(){ btn.innerHTML = '📋 Copiar Tudo'; }, 1500);
    }

    function whatsappTodos() {
      var disponiveis = convitesCache.filter(function(c){return c.status === 'disponivel';});
      var msg = '🇺🇸🔥 *Convite Jimmy\'s Bar*\n\n' + escapeHtml(lote.nome) + '\n📅 ' + fmtData(lote.data_evento) + '\n\n';
      msg += 'Cada link é único e individual. Distribua entre os convidados:\n\n';
      msg += disponiveis.map(function(c){ return '*' + c.numero_convite + '.* ' + urlConvite(c.token); }).join('\n\n');
      window.open('https://wa.me/?text=' + encodeURIComponent(msg.replace(/\*/g, '')), '_blank');
    }

    async function cancelarConvite(id) {
      if (!confirm('Cancelar esse convite? Quem receber o link não vai mais conseguir usar.')) return;
      var resp = await sb.from('convites').update({ status: 'cancelado' }).eq('id', id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast('Convite cancelado', 'success');
      carregar();
    }

    function exportarCSV() {
      var headers = ['Nº','Token','Link','Status','Cliente','Telefone','Pessoas','Usado em'];
      var linhas = convitesCache.map(function(c){
        var nome = '', tel = '', qtd = '';
        if (c.reservas && c.reservas.clientes) {
          nome = c.reservas.clientes.nome_completo || '';
          tel = c.reservas.clientes.telefone ? fmtTelefone(c.reservas.clientes.telefone) : '';
          qtd = c.reservas.qtd_pessoas || '';
        }
        return [c.numero_convite, c.token, urlConvite(c.token), c.status, nome, tel, qtd, c.usado_em ? fmtDataHora(c.usado_em) : ''];
      });
      var csv = [headers].concat(linhas).map(function(l){ return l.map(function(v){ return '"' + String(v).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
      var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'lote-' + lote.nome.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      toast('CSV exportado ✓', 'success');
    }

    document.getElementById('btn-fechar-links').addEventListener('click', function(){ modalLinks.classList.remove('active'); });
    document.getElementById('btn-copiar-todos').addEventListener('click', copiarTodosLinks);
    document.getElementById('btn-whatsapp-todos').addEventListener('click', whatsappTodos);
    modalLinks.addEventListener('click', function(e){ if (e.target === modalLinks) modalLinks.classList.remove('active'); });

    carregar();
  } catch(err) { alert('Erro fatal: ' + err.message); }
})();
  </script>
</body>
</html>
