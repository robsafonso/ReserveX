<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes · ReserveX · Jimmy's</title>
  <link rel="stylesheet" href="assets/styles.css?v=1">
  <style>
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-box input {
      padding-left: 40px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }
    .chip {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip.active {
      background: var(--color-red);
      color: #fff;
      border-color: var(--color-red);
    }
    .cliente-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-sm);
      cursor: pointer;
      transition: all 0.15s;
    }
    .cliente-card:hover {
      border-color: var(--color-red);
      transform: translateX(4px);
    }
    .cliente-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-md);
    }
    .cliente-info {
      flex: 1;
      min-width: 0;
    }
    .cliente-nome {
      font-weight: 600;
      color: var(--color-cream);
      font-size: 1rem;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cliente-meta {
      display: flex;
      gap: var(--space-md);
      font-size: 0.8125rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .cliente-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .modal-backdrop.active { display: flex; }
    .modal-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-top: 3px solid var(--color-red);
      width: 100%;
      max-width: 600px;
      max-height: 92vh;
      overflow-y: auto;
      padding: var(--space-lg);
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border-default);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.03em;
      color: var(--color-cream);
    }
    .close-btn {
      background: var(--bg-tertiary);
      border: none;
      color: var(--text-secondary);
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 1.25rem;
    }
    .empty {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
      opacity: 0.4;
    }
    .stats-mini {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    .stat-mini {
      flex: 1;
      min-width: 110px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
    }
    .stat-mini-value {
      font-family: var(--font-display);
      font-size: 1.75rem;
      color: var(--color-cream);
      line-height: 1;
    }
    .stat-mini-label {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
    .tag-edit {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: var(--space-sm);
    }
    .tag-toggle {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-default);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tag-toggle.on {
      background: var(--color-gold);
      color: #000;
      border-color: var(--color-gold);
    }
  </style>
</head>

    <div class="filter-chips" id="chips">

      <span class="chip" data-filtro="vip">⭐ VIP</span>
      <span class="chip" data-filtro="recorrente">Recorrentes</span>
      <span class="chip" data-filtro="novo">Novos</span>
      <span class="chip" data-filtro="aniversariante">🎂 Aniversariantes</span>
    </div>
    
    <div id="lista-clientes"></div>
    
  </main>

        <button class="close-btn" onclick="fecharModal()">✕</button>
      </div>
      
      <div id="modal-body"></div>

        <button class="btn btn-danger" id="btn-deletar" style="margin-left: auto;">🗑️</button>
      </div>
    </div>
  </div>
