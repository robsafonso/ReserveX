  <script>
    // Captura QUALQUER erro pra debug
    window.addEventListener('error', e => {
      alert('ERRO: ' + e.message + '\nLinha: ' + (e.lineno || '?'));
    });
    window.addEventListener('unhandledrejection', e => {
      alert('PROMISE ERRO: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason)));
    });

    .tag-toggle.on { background: var(--color-gold); color: #000; border-color: var(--color-gold); }
  </style>
