<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas · ReserveX · Jimmy's</title>
  <link rel="stylesheet" href="assets/styles.css?v=3">
  <script>
    window.addEventListener('error', function(e) { alert('ERRO JS: ' + e.message + '\nLinha: ' + (e.lineno || '?')); });
    window.addEventListener('unhandledrejection', function(e) { alert('PROMISE ERRO: ' + (e.reason && e.reason.message ? e.reason.message : JSON.stringify(e.reason))); });
  </script>
  <style>
    .toolbar { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-md); align-items: center; }
    .toolbar input[type="date"] { flex: 1; min-width: 160px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); overflow-x: auto; }
    .chip { padding: 6px 14px; border-radius: var(--radius-full); background: var(--bg-tertiary); border: 1px solid var(--border-default); color: var(--text-secondary); font-size: 0.8125rem; cursor: pointer; white-space: nowrap; }
    .chip.active { background: var(--color-red); color: #fff; border-color: var(--color-red); }
    .reserva-card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-sm); cursor: pointer; }
    .reserva-card.pendente { border-left: 3px solid var(--color-warning); }
    .reserva-card.confirmada { border-left: 3px solid var(--color-green); }
    .reserva-card.em_uso { border-left: 3px solid var(--color-info); }
    .reserva-card.cancelada, .reserva-card.no_show { border-left: 3px solid var(--color-error); opacity: 0.6; }
    .reserva-card.finalizada { border-left: 3px solid #404040; opacity: 0.7; }
    .reserva-row { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-md); }
    .reserva-info { flex: 1; min-width: 0; }
    .reserva-nome { font-weight: 600; color: var(--color-cream); font-size: 1rem; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reserva-meta { display: flex; gap: var(--space-md); font-size: 0.8125rem; color: var(--text-muted); flex-wrap: wrap; }
    .modal-backdrop { position: fixed; top:0;right:0;bottom:0;left:0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal-backdrop.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-top: 3px solid var(--color-red); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: var(--space-lg); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); padding-bottom: var(--space-md); border-bottom: 1px solid var(--border-default); }
    .modal-title { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-cream); }
    .close-btn { background: var(--bg-tertiary); border: none; color: var(--text-secondary); width: 36px; height: 36px; border-radius: var(--radius-full); cursor: pointer; font-size: 1.25rem; }
    .empty { text-align: center; padding: var(--space-2xl) var(--space-md); color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: var(--space-md); opacity: 0.4; }
    .link-box { background: var(--bg-tertiary); border: 1px dashed var(--color-gold); border-radius: var(--radius-md); padding: var(--space-md); word-break: break-all; font-size: 0.8125rem; color: var(--color-cream); margin-bottom: var(--space-md); font-family: monospace; }
    .acao-btn { width: 100%; margin-bottom: 8px; }
    .stats-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-lg); flex-wrap: wrap; }
    .stat-pill { flex: 1; min-width: 80px; background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 10px; text-align: center; }
    .stat-pill-v { font-family: var(--font-display); font-size: 1.5rem; line-height: 1; color: var(--color-cream); }
    .stat-pill-l { font-size: 0.625rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    .cliente-encontrado { background: rgba(42, 171, 71, 0.15); border: 1px solid var(--color-green); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); }
    .cliente-novo-aviso { background: rgba(201, 151, 60, 0.1); border: 1px dashed var(--color-gold); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); }
    .step-title { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.05em; color: var(--color-gold); margin-bottom: var(--space-md); padding-bottom: 8px; border-bottom: 1px solid var(--border-default); text-transform: uppercase; }
    .mesa-pick-info { background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); display: flex; justify-content: space-between; align-items: center; }
    .mesa-pick-info.tem { border-color: var(--color-green); background: rgba(42, 171, 71, 0.1); }
    .setor-grupo { margin-bottom: var(--space-md); }
    .setor-titulo { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-gold); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .setor-pill { width: 10px; height: 10px; border-radius: 50%; }
    .mesa-grid-pick { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
    .mesa-opt { padding: 10px 4px; background: var(--bg-tertiary); border: 2px solid var(--border-default); border-radius: var(--radius-md); cursor: pointer; text-align: center; }
    .mesa-opt:active { transform: scale(0.97); }
    .mesa-opt.ideal { border-color: var(--color-green); background: rgba(42, 171, 71, 0.08); }
    .mesa-opt.apertado { border-color: var(--color-warning); background: rgba(201, 151, 60, 0.06); }
    .mesa-opt.sel { border-color: var(--color-gold) !important; background: rgba(201, 151, 60, 0.25) !important; }
    .mesa-opt-nome { font-family: var(--font-display); font-size: 1.25rem; color: var(--color-cream); line-height: 1; }
    .mesa-opt-cap { font-size: 0.625rem; color: var(--text-muted); margin-top: 4px; }
    .mesa-opt.apertado .mesa-opt-cap { color: var(--color-warning); }
    .legenda-cores { display: flex; gap: var(--space-md); font-size: 0.75rem; color: var(--text-muted); margin-bottom: var(--space-md); flex-wrap: wrap; }
    .legenda-item { display: flex; align-items: center; gap: 6px; }
    .legenda-dot { width: 12px; height: 12px; border-radius: 3px; border: 2px solid; }
    .evento-disponivel { background: linear-gradient(135deg, rgba(200,16,46,0.15), rgba(201,151,60,0.15)); border: 1px solid var(--color-gold); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="home.html" class="brand">
        <div class="brand-logo">JIMMY<strong>'S</strong></div>
        <span class="brand-badge">v1.1</span>
      </a>
      <div class="user-menu">
        <a href="home.html" class="btn btn-ghost btn-sm">← Voltar</a>
      </div>
    </div>
  </header>
  <main class="container fade-in">
    <h1 style="font-family: var(--font-display); margin-bottom: var(--space-sm);">Reservas</h1>
    <p class="text-secondary" style="margin-bottom: var(--space-lg);">Reservas, walk-ins e alocação de mesa.</p>

    <div class="stats-row">
      <div class="stat-pill"><div class="stat-pill-v" id="s-pend">—</div><div class="stat-pill-l">Pendentes</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-conf">—</div><div class="stat-pill-l">Confirmadas</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-uso">—</div><div class="stat-pill-l">Em uso</div></div>
      <div class="stat-pill"><div class="stat-pill-v" id="s-tot">—</div><div class="stat-pill-l">Total pessoas</div></div>
    </div>

    <div class="toolbar">
      <input type="date" id="data-filtro" class="form-input">
      <button type="button" class="btn btn-ghost btn-sm" id="btn-hoje">Hoje</button>
      <button type="button" class="btn btn-primary btn-sm" id="btn-gerar-link">🔗 Link</button>
      <button type="button" class="btn btn-secondary btn-sm" id="btn-nova-manual">+ Manual</button>
    </div>

    <div class="filter-chips" id="chips">
      <span class="chip active" data-filtro="ativas">Ativas</span>
      <span class="chip" data-filtro="todas">Todas</span>
      <span class="chip" data-filtro="pendente">Pendentes</span>
      <span class="chip" data-filtro="confirmada">Confirmadas</span>
      <span class="chip" data-filtro="em_uso">Em uso</span>
      <span class="chip" data-filtro="cancelada">Canceladas</span>
      <span class="chip" data-filtro="no_show">No-show</span>
      <span class="chip" data-filtro="finalizada">Finalizadas</span>
    </div>

    <div id="lista-reservas"></div>
  </main>

  <div class="modal-backdrop" id="modal-link">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">🔗 Gerar Link</div><button type="button" class="close-btn" id="btn-fechar-link">✕</button></div>
      <div id="link-body">
        <div class="form-group"><label class="form-label">Data *</label><input type="date" id="lf-data" class="form-input"></div>
        <div class="form-group"><label class="form-label">Validade</label><select id="lf-validade" class="form-select"><option value="24">24 horas</option><option value="48">48 horas</option><option value="72">3 dias</option><option value="168" selected>7 dias</option><option value="0">Sem validade</option></select></div>
        <button type="button" class="btn btn-primary btn-block" id="btn-criar-link">Gerar</button>
      </div>
      <div id="link-resultado" style="display:none;">
        <div class="alert alert-success" style="font-size:0.875rem;">✓ Link gerado!</div>
        <div class="link-box" id="link-url"></div>
        <button type="button" class="btn btn-gold btn-block" id="btn-copiar-link">📋 Copiar</button>
        <button type="button" class="btn btn-secondary btn-block" id="btn-whatsapp-link" style="margin-top:8px;">💬 WhatsApp</button>
        <button type="button" class="btn btn-ghost btn-block" id="btn-novo-link" style="margin-top:8px;">+ Outro</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-reserva">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title" id="mr-titulo">Reserva</div><button type="button" class="close-btn" id="btn-fechar-reserva">✕</button></div>
      <div id="mr-body"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-manual">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">+ Reserva Manual</div><button type="button" class="close-btn" id="btn-fechar-manual">✕</button></div>
      <div id="manual-body"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-mesa-pick">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">🪑 Escolher Mesa</div><button type="button" class="close-btn" id="btn-fechar-mesa-pick">✕</button></div>
      <div id="mp-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js?v=3"></script>
  <script>
(function(){
  try {
    var admin = exigirLogin();
    if (!admin) return;

    var reservasCache = [];
    var mesasCache = [];
    var setoresCache = [];
    var eventosCache = [];
    var dataFiltro = hojeISO();
    var statusFiltro = 'ativas';
    var reservaSelecionada = null;
    var clienteEncontrado = null;
    var mesaSelecionadaForm = null;
    var eventoSelecionadoForm = null;
    var dataReservaForm = null;
    var mesaPickerCallback = null;
    var mesaPickerSelecionada = null;
    var mesaPickerQtd = 1;

    var modalLink = document.getElementById('modal-link');
    var modalReserva = document.getElementById('modal-reserva');
    var modalManual = document.getElementById('modal-manual');
    var modalMesaPick = document.getElementById('modal-mesa-pick');

    function escapeHtml(str){if(str===null||str===undefined)return ''; return String(str).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function fmtCpf(cpf){if(!cpf)return ''; var d=cpf.replace(/\D/g,''); if(d.length!==11)return cpf; return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9);}
    function aplicarMascaraCPF(input){input.addEventListener('input',function(){var v=input.value.replace(/\D/g,'').slice(0,11);if(v.length>9)v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);else if(v.length>6)v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);else if(v.length>3)v=v.slice(0,3)+'.'+v.slice(3);input.value=v;});}
    function aplicarMascaraTel(input){input.addEventListener('input',function(){var v=input.value.replace(/\D/g,'').slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;input.value=v;});}

    document.getElementById('data-filtro').value = dataFiltro;

    async function carregar() {
      try {
        var s = await sb.from('setores').select('*').eq('tenant_id', TENANT_ID).eq('ativo', true).order('ordem');
        if (s.error) throw new Error(s.error.message);
        setoresCache = s.data || [];

        var m = await sb.from('mesas').select('*').eq('tenant_id', TENANT_ID).eq('ativa', true).order('nome');
        if (m.error) throw new Error(m.error.message);
        mesasCache = m.data || [];

        var ev = await sb.from('eventos').select('*').eq('tenant_id', TENANT_ID).in('status', ['ativo','rascunho']);
        eventosCache = ev.data || [];

        var r = await sb.from('reservas')
          .select('*, clientes(nome_completo, telefone, instagram, cpf), mesas(nome), eventos(nome)')
          .eq('tenant_id', TENANT_ID)
          .eq('data', dataFiltro)
          .order('created_at', { ascending: false });
        if (r.error) throw new Error(r.error.message);
        reservasCache = r.data || [];

        renderizar();
      } catch(err) { alert('Erro: ' + err.message); }
    }

    function eventosNaData(data) {
      return eventosCache.filter(function(e){ return e.data === data && e.status !== 'cancelado' && e.status !== 'encerrado'; });
    }

    async function buscarReservasNaData(data) {
      var r = await sb.from('reservas').select('mesa_id, status, id').eq('tenant_id', TENANT_ID).eq('data', data).in('status', ['pendente','confirmada','em_uso']);
      return r.data || [];
    }

    async function abrirSeletorMesa(dataAlvo, ignorarReservaId, mesaAtualId, qtdPessoas, callback) {
      mesaPickerCallback = callback;
      mesaPickerSelecionada = mesaAtualId || null;
      mesaPickerQtd = qtdPessoas || 1;
      modalMesaPick.classList.add('active');
      document.getElementById('mp-body').innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto;"></div></div>';

      var reservasNaData = (dataAlvo === dataFiltro) ? reservasCache : await buscarReservasNaData(dataAlvo);
      var ocupadas = reservasNaData.filter(function(r){ return r.mesa_id && r.id !== ignorarReservaId; }).map(function(r){ return r.mesa_id; });

      var html = '<p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:var(--space-md);">Mesas pra <strong>' + fmtData(dataAlvo) + '</strong> · <strong>' + mesaPickerQtd + ' pessoa(s)</strong></p>' +
        '<div class="legenda-cores">' +
          '<div class="legenda-item"><span class="legenda-dot" style="border-color:var(--color-green)"></span>Cabe folgado (≥' + mesaPickerQtd + ')</div>' +
          '<div class="legenda-item"><span class="legenda-dot" style="border-color:var(--color-warning)"></span>Apertado (puxar cadeira)</div>' +
        '</div>';

      var temAlguma = false;

      setoresCache.forEach(function(s){
        var mesasSetor = mesasCache.filter(function(m){
          return m.setor_id === s.id && ocupadas.indexOf(m.id) < 0 && m.status !== 'bloqueada';
        });
        mesasSetor.sort(function(a,b){
          var aIdeal = a.capacidade >= mesaPickerQtd ? 0 : 1;
          var bIdeal = b.capacidade >= mesaPickerQtd ? 0 : 1;
          if (aIdeal !== bIdeal) return aIdeal - bIdeal;
          return (a.nome || '').localeCompare(b.nome || '');
        });
        if (mesasSetor.length === 0) return;
        temAlguma = true;
        html += '<div class="setor-grupo"><div class="setor-titulo"><span class="setor-pill" style="background:' + s.cor + '"></span>' + escapeHtml(s.nome) + '</div><div class="mesa-grid-pick">';
        mesasSetor.forEach(function(m){
          var sel = m.id === mesaPickerSelecionada ? 'sel' : '';
          var classe = m.capacidade >= mesaPickerQtd ? 'ideal' : 'apertado';
          html += '<div class="mesa-opt ' + classe + ' ' + sel + '" data-id="' + m.id + '"><div class="mesa-opt-nome">' + escapeHtml(m.nome) + '</div><div class="mesa-opt-cap">' + m.capacidade + 'p</div></div>';
        });
        html += '</div></div>';
      });

      if (!temAlguma) html += '<div class="alert alert-warning" style="font-size:0.875rem;">Nenhuma mesa disponível.</div>';

      html += '<div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg);">' +
        '<button type="button" class="btn btn-primary" id="mp-confirmar" style="flex:1;">✓ Confirmar</button>' +
        '<button type="button" class="btn btn-ghost" id="mp-sem">Sem mesa</button>' +
      '</div>';

      document.getElementById('mp-body').innerHTML = html;
      Array.prototype.forEach.call(document.querySelectorAll('.mesa-opt'), function(el){
        el.addEventListener('click', function(){
          Array.prototype.forEach.call(document.querySelectorAll('.mesa-opt'), function(x){ x.classList.remove('sel'); });
          el.classList.add('sel');
          mesaPickerSelecionada = el.dataset.id;
        });
      });
      document.getElementById('mp-confirmar').addEventListener('click', function(){
        modalMesaPick.classList.remove('active');
        if (mesaPickerCallback) mesaPickerCallback(mesaPickerSelecionada);
      });
      document.getElementById('mp-sem').addEventListener('click', function(){
        modalMesaPick.classList.remove('active');
        if (mesaPickerCallback) mesaPickerCallback(null);
      });
    }

    function renderizar() {
      var stats = { pendente:0, confirmada:0, em_uso:0, totPessoas:0 };
      reservasCache.forEach(function(r){
        if (stats.hasOwnProperty(r.status)) stats[r.status]++;
        if (['pendente','confirmada','em_uso'].indexOf(r.status) >= 0) stats.totPessoas += (r.qtd_pessoas || 0);
      });
      document.getElementById('s-pend').textContent = stats.pendente;
      document.getElementById('s-conf').textContent = stats.confirmada;
      document.getElementById('s-uso').textContent = stats.em_uso;
      document.getElementById('s-tot').textContent = stats.totPessoas;

      var filtradas = reservasCache;
      if (statusFiltro === 'ativas') {
        filtradas = filtradas.filter(function(r){return ['pendente','confirmada','em_uso'].indexOf(r.status) >= 0;});
      } else if (statusFiltro !== 'todas') {
        filtradas = filtradas.filter(function(r){return r.status === statusFiltro;});
      }

      var el = document.getElementById('lista-reservas');
      if (filtradas.length === 0) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Nenhuma reserva ' + (statusFiltro !== 'todas' ? statusFiltro : '') + ' nessa data.</p></div>';
        return;
      }

      var html = '';
      filtradas.forEach(function(r){
        var nome = r.clientes ? r.clientes.nome_completo : '(sem cliente — token pendente)';
        var tel = r.clientes ? fmtTelefone(r.clientes.telefone) : '';
        var statusLabel = r.status === 'em_uso' ? 'em uso' : r.status === 'no_show' ? 'no-show' : r.status;
        var mesaLabel = r.mesas ? '🪑 ' + escapeHtml(r.mesas.nome) : '🪑 Sem mesa';
        html += '<div class="reserva-card ' + r.status + '" data-id="' + r.id + '">' +
          '<div class="reserva-row">' +
            '<div class="reserva-info">' +
              '<div class="reserva-nome">' + escapeHtml(nome) + '</div>' +
              '<div class="reserva-meta">' +
                '<span>👥 ' + r.qtd_pessoas + '</span>' +
                (tel ? '<span>📞 ' + tel + '</span>' : '') +
                '<span>' + mesaLabel + '</span>' +
                (r.eventos ? '<span>🎤 ' + escapeHtml(r.eventos.nome) + '</span>' : '') +
                '<span>📍 ' + r.origem + '</span>' +
              '</div>' +
            '</div>' +
            '<span class="badge badge-' + (r.status === 'pendente' ? 'gold' : r.status === 'confirmada' ? 'green' : r.status === 'em_uso' ? 'blue' : 'gray') + '">' + statusLabel + '</span>' +
          '</div>' +
        '</div>';
      });
      el.innerHTML = html;
      Array.prototype.forEach.call(el.querySelectorAll('.reserva-card'), function(card){
        card.addEventListener('click', function(){ abrirModalReserva(card.dataset.id); });
      });
    }

    function abrirModalLink() {
      document.getElementById('lf-data').value = dataFiltro;
      document.getElementById('link-body').style.display = '';
      document.getElementById('link-resultado').style.display = 'none';
      modalLink.classList.add('active');
    }
    async function criarLink() {
      try {
        var data = document.getElementById('lf-data').value;
        var horas = parseInt(document.getElementById('lf-validade').value, 10);
        if (!data) { toast('Escolha uma data', 'error'); return; }
        var token = gerarToken(20);
        var expiraEm = horas > 0 ? new Date(Date.now() + horas * 3600 * 1000).toISOString() : null;
        var dadosLink = {
          tenant_id: TENANT_ID, data: data, qtd_pessoas: 1, status: 'pendente',
          origem: 'direto', token: token, expira_em: expiraEm, criada_por: admin.id
        };
        var evs = eventosNaData(data);

    async function vincularEvento(eventoId) {
      if (!reservaSelecionada) return;
      var resp = await sb.from('reservas').update({ evento_id: eventoId }).eq('id', reservaSelecionada.id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast('Vinculado ao evento ✓', 'success');
      modalReserva.classList.remove('active');
      carregar();
    }

    async function alterarMesa(mesaId, depoisFazerCheckin) {
      if (!reservaSelecionada) return;
      var resp = await sb.from('reservas').update({ mesa_id: mesaId }).eq('id', reservaSelecionada.id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast(mesaId ? 'Mesa atribuída ✓' : 'Mesa removida', 'success');
      reservaSelecionada.mesa_id = mesaId;
      if (depoisFazerCheckin) await alterarStatus('em_uso');
      else { modalReserva.classList.remove('active'); carregar(); }
    }

    async function alterarStatus(novo) {
      if (!reservaSelecionada) return;
      var dados = { status: novo };
      if (novo === 'confirmada') dados.confirmada_por = admin.id;
      if (novo === 'cancelada') dados.cancelada_por = admin.id;
      var resp = await sb.from('reservas').update(dados).eq('id', reservaSelecionada.id);
      if (resp.error) { toast('Erro: ' + resp.error.message, 'error'); return; }
      toast('Reserva atualizada ✓', 'success');
      modalReserva.classList.remove('active');
      carregar();
    }

    async function buscarCliente() {
      var tel = document.getElementById('busca-tel').value.replace(/\D/g, '');
      var cpf = document.getElementById('busca-cpf').value.replace(/\D/g, '');
      var div = document.getElementById('resultado-busca');
      if (!tel && !cpf) { toast('Digite telefone ou CPF', 'error'); return; }
      if (tel && tel.length < 10) { toast('Telefone incompleto', 'error'); return; }
      if (cpf && cpf.length !== 11) { toast('CPF inválido', 'error'); return; }
      div.innerHTML = '<div class="spinner" style="margin: 0 auto;"></div>';
      try {
        var query = sb.from('clientes').select('*').eq('tenant_id', TENANT_ID).eq('ativo', true);
        if (cpf) query = query.eq('cpf', cpf);
        else query = query.eq('telefone', tel);
        var resp = await query.maybeSingle();
        if (resp.data) { clienteEncontrado = resp.data; mostrarClienteEncontrado(); }
        else mostrarFormularioNovo(tel, cpf);
      } catch(err) { div.innerHTML = '<div class="alert alert-error">Erro: ' + err.message + '</div>'; }
    }

      var c = clienteEncontrado;
      var html = '<div class="cliente-encontrado">' +
        '<strong style="color:var(--color-cream);font-size:1.0625rem;">✓ ' + escapeHtml(c.nome_completo) + '</strong>' +
        '<div style="font-size:0.8125rem;color:var(--text-secondary);margin-top:6px;">' +
          (c.telefone ? '📞 ' + fmtTelefone(c.telefone) + '<br>' : '') +
          (c.cpf ? '📄 ' + fmtCpf(c.cpf) + '<br>' : '') +
          '👁 ' + (c.visitas_total || 0) + ' visitas · ' + c.classificacao +
        '</div>' +
      '</div>' +
      camposReserva() +
      '<div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg);">' +
        '<button type="button" class="btn btn-primary" id="btn-confirmar-reserva" style="flex:1;">✓ Cadastrar Reserva</button>' +
        '<button type="button" class="btn btn-ghost" id="btn-trocar">Trocar</button>' +
      '</div>';

      var html = '<div class="cliente-novo-aviso">' +
        '<strong style="color:var(--color-gold);">⚠ Cliente não encontrado</strong>' +

    function camposReserva() {
      var passo = clienteEncontrado ? '2' : '3';
      var mesaTxt = mesaSelecionadaForm ? mesasCache.find(function(m){return m.id === mesaSelecionadaForm;}) : null;
      var mesaHtml = mesaTxt
        ? '<div class="mesa-pick-info tem"><div><strong style="color:var(--color-cream);">🪑 Mesa ' + escapeHtml(mesaTxt.nome) + '</strong></div><button type="button" class="btn btn-ghost btn-sm" id="btn-pick-mesa">Trocar</button></div>'
        : '<div class="mesa-pick-info"><div style="color:var(--text-secondary);">🪑 Sem mesa</div><button type="button" class="btn btn-gold btn-sm" id="btn-pick-mesa">Escolher</button></div>';

      var dataAtual = dataReservaForm || dataFiltro;
      var evs = eventosNaData(dataAtual);
      var eventoHtml = '';
      if (evs.length > 0) {
        eventoHtml = '<div class="form-group"><label class="form-label">🎤 Evento (' + evs.length + ' nesse dia)</label><select id="r-evento" class="form-select"><option value="">Sem evento</option>';
        evs.forEach(function(e){
          eventoHtml += '<option value="' + e.id + '"' + (e.id === eventoSelecionadoForm ? ' selected' : '') + '>' + escapeHtml(e.nome) + (e.valor_couvert > 0 ? ' (R$' + parseFloat(e.valor_couvert).toFixed(2).replace('.',',') + ')' : '') + '</option>';
        });
        eventoHtml += '</select></div>';
      }

      return '<div class="step-title" style="margin-top:var(--space-lg);">' + passo + '. Dados da reserva</div>' +
        '<div class="form-group"><label class="form-label">Data *</label><input type="date" id="r-data" class="form-input" value="' + dataAtual + '"></div>' +
        '<div class="form-group"><label class="form-label">Pessoas *</label><input type="number" id="r-pessoas" class="form-input" inputmode="numeric" min="1" value="2"></div>' +
        '<div class="form-group"><label class="form-label">Origem</label><select id="r-origem" class="form-select"><option value="walk_in">Walk-in (chegou na hora)</option><option value="telefone">Telefone</option><option value="instagram">Instagram</option><option value="direto">Direto (recepção)</option></select></div>' +
        eventoHtml +
        '<div class="form-group"><label class="form-label">Mesa</label>' + mesaHtml + '</div>' +
        '<div class="form-group"><label class="form-label">Observações</label><textarea id="r-obs" class="form-textarea" placeholder="Aniversário, alergias..."></textarea></div>';
    }

    function ligarCamposReserva() {
      var btnPM = document.getElementById('btn-pick-mesa');
      if (btnPM) btnPM.addEventListener('click', function(){
        var data = document.getElementById('r-data').value;
        var qtd = parseInt(document.getElementById('r-pessoas').value, 10) || 1;
        abrirSeletorMesa(data, null, mesaSelecionadaForm, qtd, function(novaMesaId){
          mesaSelecionadaForm = novaMesaId;
          if (clienteEncontrado) mostrarClienteEncontrado();
          else mostrarFormularioNovo(
            document.getElementById('novo-tel') ? document.getElementById('novo-tel').value.replace(/\D/g,'') : '',
            document.getElementById('novo-cpf') ? document.getElementById('novo-cpf').value.replace(/\D/g,'') : ''
          );
        });
      });
      var rEv = document.getElementById('r-evento');
      if (rEv) rEv.addEventListener('change', function(){ eventoSelecionadoForm = rEv.value || null; });
      var rData = document.getElementById('r-data');
      if (rData) rData.addEventListener('change', function(){
        dataReservaForm = rData.value;
        eventoSelecionadoForm = null;
        var evs = eventosNaData(rData.value);
        if (evs.length === 1) eventoSelecionadoForm = evs[0].id;
        if (clienteEncontrado) mostrarClienteEncontrado();
        else mostrarFormularioNovo(
          document.getElementById('novo-tel') ? document.getElementById('novo-tel').value.replace(/\D/g,'') : '',
          document.getElementById('novo-cpf') ? document.getElementById('novo-cpf').value.replace(/\D/g,'') : ''
        );
      });
    }

    async function salvarReserva(cadastrarCliente) {
      try {
        var data = document.getElementById('r-data').value;
        var pessoas = parseInt(document.getElementById('r-pessoas').value, 10);
        var origem = document.getElementById('r-origem').value;
        var obs = document.getElementById('r-obs').value.trim();
        var rEv = document.getElementById('r-evento');
        var eventoId = rEv ? (rEv.value || null) : null;
        if (!data) { toast('Data inválida', 'error'); return; }
        if (!pessoas || pessoas < 1) { toast('Pessoas inválido', 'error'); return; }
        var clienteId;
        if (cadastrarCliente) {
          var nome = document.getElementById('novo-nome').value.trim();
          var tel = document.getElementById('novo-tel').value.replace(/\D/g, '');
          var cpf = document.getElementById('novo-cpf').value.replace(/\D/g, '');
          var ig = document.getElementById('novo-ig').value.trim();
          if (!nome || nome.length < 3) { toast('Nome obrigatório', 'error'); return; }
          if (!tel || tel.length < 10) { toast('Telefone inválido', 'error'); return; }
          if (cpf && cpf.length !== 11) { toast('CPF inválido', 'error'); return; }
          var novo = await sb.from('clientes').insert({
            tenant_id: TENANT_ID, nome_completo: nome, telefone: tel, cpf: cpf || null,
            instagram: ig || null, origem: origem === 'walk_in' ? 'walk_in' : 'manual'
          }).select('id').maybeSingle();
          if (novo.error) {
            if (novo.error.code === '23505') { toast('Telefone ou CPF já cadastrado', 'error'); return; }
            throw new Error(novo.error.message);
          }
          clienteId = novo.data.id;
        } else { clienteId = clienteEncontrado.id; }
        var resp = await sb.from('reservas').insert({
          tenant_id: TENANT_ID, cliente_id: clienteId, data: data,
          qtd_pessoas: pessoas, status: 'confirmada', origem: origem,
          mesa_id: mesaSelecionadaForm || null, evento_id: eventoId,
          observacoes: obs || null, criada_por: admin.id, confirmada_por: admin.id
        });
        if (resp.error) throw new Error(resp.error.message);
        toast(cadastrarCliente ? 'Cliente + reserva criados ✓' : 'Reserva criada ✓', 'success');
        modalManual.classList.remove('active');
        carregar();
      } catch(err) { toast('Erro: ' + err.message, 'error'); }
    }

    modalManual.addEventListener('click', function(e){ if (e.target === modalManual) modalManual.classList.remove('active'); });
    document.getElementById('btn-fechar-mesa-pick').addEventListener('click', function(){ modalMesaPick.classList.remove('active'); });

    carregar();
  } catch(err) { alert('Erro fatal: ' + err.message); }
})();
  </script>
