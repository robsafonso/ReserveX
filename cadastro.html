<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sua Reserva · Jimmy's Bar</title>
  <link rel="stylesheet" href="assets/styles.css?v=3">
  <style>
    body { background: #0d0d0d; min-height: 100vh; }
    .pub-container { max-width: 480px; margin: 0 auto; padding: var(--space-lg); }
    .pub-header { text-align: center; padding: var(--space-2xl) 0 var(--space-lg); }
    .pub-stripes { display: flex; justify-content: center; gap: 6px; margin-bottom: var(--space-md); }
    .pub-stripe { width: 38px; height: 5px; border-radius: 2px; }
    .pub-stripe.r { background: var(--color-red); }
    .pub-stripe.w { background: var(--color-cream); }
    .pub-stripe.b { background: var(--color-navy); }
    .pub-logo { font-family: var(--font-display); font-size: 3.25rem; letter-spacing: 0.08em; color: var(--color-cream); line-height: 1; }
    .pub-logo strong { font-family: 'Playfair Display', serif; font-style: italic; color: var(--color-red); font-weight: 900; }
    .pub-sub { font-size: 0.8125rem; letter-spacing: 0.3em; color: var(--color-gold); text-transform: uppercase; margin-top: 8px; }
    .info-card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-top: 3px solid var(--color-red); border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-lg); }
    .info-evento { background: linear-gradient(135deg, rgba(200,16,46,0.15), rgba(201,151,60,0.15)); border: 1px solid var(--color-gold); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md); text-align: center; }
    .info-evento-nome { font-family: var(--font-display); color: var(--color-gold); font-size: 1.375rem; letter-spacing: 0.05em; }
    .info-evento-data { font-size: 0.875rem; color: var(--color-cream); margin-top: 4px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-default); font-size: 0.875rem; }
    .info-row:last-child { border-bottom: none; }
    .info-l { color: var(--text-muted); }
    .info-v { color: var(--color-cream); font-weight: 600; }
    .convite-num { display: inline-block; background: var(--color-gold); color: #0d0d0d; font-family: var(--font-display); font-size: 1rem; padding: 2px 12px; border-radius: var(--radius-full); letter-spacing: 0.05em; }
    .estado { text-align: center; padding: var(--space-2xl) var(--space-md); }
    .estado-icon { font-size: 4rem; margin-bottom: var(--space-md); }
    .estado-titulo { font-family: var(--font-display); color: var(--color-cream); font-size: 1.5rem; margin-bottom: 8px; }
    .estado-sub { color: var(--text-secondary); font-size: 0.9375rem; margin-bottom: var(--space-lg); word-break: break-word; }
    .footer-info { text-align: center; padding: var(--space-lg) 0; color: var(--text-muted); font-size: 0.8125rem; }
    .footer-info strong { color: var(--color-gold); }
    .step-title { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.05em; color: var(--color-gold); margin-bottom: var(--space-md); padding-bottom: 8px; border-bottom: 1px solid var(--border-default); text-transform: uppercase; }
    .bilhete-aviso-pre { background: rgba(201,151,60,0.1); border: 1px dashed var(--color-gold); border-radius: var(--radius-md); padding: 12px; margin-top: var(--space-md); margin-bottom: var(--space-md); font-size: 0.8125rem; color: var(--color-cream); text-align: center; line-height: 1.4; }
    .bilhete-success { background: linear-gradient(135deg, rgba(201,151,60,0.18), rgba(200,16,46,0.12)); border: 1px solid var(--color-gold); border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-md); text-align: center; }
    .bilhete-success-titulo { font-family: var(--font-display); color: var(--color-gold); font-size: 1.125rem; margin-bottom: 8px; letter-spacing: 0.05em; }
    .bilhete-success-sub { font-size: 0.875rem; color: var(--color-cream); margin-bottom: var(--space-md); line-height: 1.4; }
    .bilhete-link-box { background: rgba(0,0,0,0.3); border: 1px dashed var(--color-gold); border-radius: var(--radius-sm); padding: 10px; }
    .bilhete-link-l { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
    .bilhete-link-v { word-break: break-all; color: var(--color-gold); font-size: 0.6875rem; font-family: monospace; }
  </style>
</head>
<body>
  <div class="pub-container">
    <div class="pub-header">
      <div class="pub-stripes"><div class="pub-stripe r"></div><div class="pub-stripe w"></div><div class="pub-stripe b"></div></div>
      <div class="pub-logo">JIMMY<strong>'S</strong></div>
      <div class="pub-sub" id="pub-sub">Sua Reserva</div>
    </div>

    <div id="loading" class="estado">
      <div class="spinner" style="margin: 0 auto var(--space-md);"></div>
      <div class="estado-sub">Validando seu link...</div>
    </div>

    <div id="invalido" class="estado" style="display:none;">
      <div class="estado-icon">🚫</div>
      <div class="estado-titulo">Link inválido</div>
      <div class="estado-sub" id="invalido-msg">Link não encontrado ou já utilizado.</div>
      <a href="https://wa.me/5543984129883" class="btn btn-primary btn-block" target="_blank">📞 Falar com o Jimmy's</a>
    </div>

    <div id="form-container" style="display:none;"></div>

    <div id="sucesso" class="estado" style="display:none;">
      <div class="estado-icon">🍻</div>
      <div class="estado-titulo" id="sucesso-titulo">Reserva Confirmada!</div>
      <div class="estado-sub" id="sucesso-msg"></div>
      <div class="info-card" id="sucesso-info"></div>
      <div id="sucesso-bilhete"></div>
      <a href="https://wa.me/5543984129883" class="btn btn-secondary btn-block" target="_blank">💬 Falar com o Jimmy's</a>
      <p style="font-size:0.8125rem;color:var(--text-muted);margin-top:var(--space-md);text-align:center;">Te esperamos! 🇺🇸🔥</p>
    </div>

    <div class="footer-info">
      📞 <strong>Reservas: 43 98412-9883</strong><br>
      📍 @jimmys.londrina
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js?v=3"></script>
  <script>
(function(){
  try {
    var token = new URLSearchParams(window.location.search).get('token');
    if (!token) { mostrarInvalido('Token não fornecido na URL.'); return; }

    var modo = null;
    var dados = null;
    var loteInfo = null;
    var eventoInfo = null;

    function escapeHtml(s){if(s==null)return ''; return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function fmtCpf(cpf){if(!cpf)return ''; var d=cpf.replace(/\D/g,''); if(d.length!==11)return cpf; return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9);}
    function aplicarMascaraCPF(input){input.addEventListener('input',function(){var v=input.value.replace(/\D/g,'').slice(0,11);if(v.length>9)v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);else if(v.length>6)v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);else if(v.length>3)v=v.slice(0,3)+'.'+v.slice(3);input.value=v;});}
    function aplicarMascaraTel(input){input.addEventListener('input',function(){var v=input.value.replace(/\D/g,'').slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;input.value=v;});}

    function urlBilhete() {
      return window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'bilhete.html?token=' + token;
    }

    function mostrarInvalido(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('invalido').style.display = '';
      if (msg) document.getElementById('invalido-msg').textContent = msg;
    }

    async function validarToken() {
      try {
        var resR = await sb.from('reservas').select('*').eq('token', token).maybeSingle();
        if (resR.error) { mostrarInvalido('DEBUG reserva-query: ' + resR.error.message); return; }

        if (resR.data) {
          var r = resR.data;
          if (r.status === 'cancelada') { mostrarInvalido('Essa reserva foi cancelada.'); return; }
          if (r.expira_em && new Date(r.expira_em) < new Date()) { mostrarInvalido('Esse link já expirou.'); return; }

          if (r.evento_id) {
            var ev = await sb.from('eventos').select('nome, data, valor_couvert').eq('id', r.evento_id).maybeSingle();
            eventoInfo = ev.data || null;
          }
          if (r.cliente_id) {
            var cl = await sb.from('clientes').select('nome_completo, telefone, cpf, instagram').eq('id', r.cliente_id).maybeSingle();
            r.clientes = cl.data || null;
          }
          modo = 'reserva';
          dados = r;
          mostrarFormulario();
          return;
        }

        var resC = await sb.from('convites').select('*').eq('token', token).maybeSingle();
        if (resC.error) { mostrarInvalido('DEBUG convite-query: ' + resC.error.message); return; }
        if (!resC.data) { mostrarInvalido('Token não encontrado em reservas nem em convites.'); return; }

        var c = resC.data;
        if (c.status === 'cancelado') { mostrarInvalido('Esse convite foi cancelado.'); return; }
        if (c.status === 'usado') {
          // Convite já usado - oferece link do bilhete
          document.getElementById('loading').style.display = 'none';
          document.getElementById('invalido').style.display = '';
          document.getElementById('invalido').querySelector('.estado-icon').textContent = '🎫';
          document.getElementById('invalido').querySelector('.estado-titulo').textContent = 'Já confirmado!';
          document.getElementById('invalido-msg').innerHTML = 'Esse convite já foi confirmado.<br>Use o link do seu bilhete:';
          var btn = document.getElementById('invalido').querySelector('.btn');
          btn.href = urlBilhete();
          btn.target = '_self';
          btn.textContent = '🎫 Ver meu bilhete digital';
          btn.className = 'btn btn-gold btn-block';
          return;
        }

        if (!c.lote_id) { mostrarInvalido('Convite sem lote vinculado.'); return; }
        var resL = await sb.from('lotes').select('*').eq('id', c.lote_id).maybeSingle();
        if (resL.error) { mostrarInvalido('DEBUG lote-query: ' + resL.error.message); return; }
        if (!resL.data) { mostrarInvalido('Lote do convite não encontrado.'); return; }

        var lote = resL.data;
        if (lote.status !== 'ativo') { mostrarInvalido('O lote desse convite não está mais ativo.'); return; }
        if (lote.expira_em && new Date(lote.expira_em) < new Date()) { mostrarInvalido('Esse convite já expirou.'); return; }

        if (lote.evento_id) {
          var ev2 = await sb.from('eventos').select('nome, data, valor_couvert').eq('id', lote.evento_id).maybeSingle();
          eventoInfo = ev2.data || null;
        }

        modo = 'convite';
        dados = c;
        loteInfo = lote;
        document.getElementById('pub-sub').textContent = 'Seu Convite';
        document.getElementById('sucesso-titulo').textContent = 'Presença Confirmada!';
        mostrarFormulario();
      } catch(err) { mostrarInvalido('CATCH: ' + err.message); }
    }

    function mostrarFormulario() {
      document.getElementById('loading').style.display = 'none';
      var container = document.getElementById('form-container');
      container.style.display = '';

      var dataEvento = modo === 'reserva' ? dados.data : (loteInfo ? loteInfo.data_evento : null);
      var clienteExistente = modo === 'reserva' ? dados.clientes : null;

      var infoEvento = '';
      if (eventoInfo) {
        infoEvento = '<div class="info-evento">' +
          '<div class="info-evento-nome">🎤 ' + escapeHtml(eventoInfo.nome) + '</div>' +
          '<div class="info-evento-data">' + fmtData(eventoInfo.data) + (eventoInfo.valor_couvert > 0 ? ' · Couvert R$ ' + parseFloat(eventoInfo.valor_couvert).toFixed(2).replace('.',',') : '') + '</div>' +
        '</div>';
      }

      var infoLote = '';
      if (modo === 'convite' && loteInfo) {
        infoLote = '<div style="text-align:center;margin-bottom:var(--space-md);">' +
          '<span class="convite-num">CONVITE #' + dados.numero_convite + '</span>' +
          '<div style="font-size:0.8125rem;color:var(--text-secondary);margin-top:6px;">' + escapeHtml(loteInfo.nome) + '</div>' +
        '</div>';
      }

      var avisoBilhete = '';
      if (modo === 'convite') {
        avisoBilhete = '<div class="bilhete-aviso-pre">🎫 Após confirmar, você receberá seu <strong style="color:var(--color-gold);">bilhete digital com QR code</strong> pra apresentar na portaria.</div>';
      }

      container.innerHTML =
        '<div class="info-card">' +
          infoLote +
          infoEvento +
          '<div class="info-row"><span class="info-l">📅 Data</span><span class="info-v">' + fmtData(dataEvento) + '</span></div>' +
          (modo === 'reserva' ? '<div class="info-row"><span class="info-l">👥 Pessoas</span><span class="info-v">' + dados.qtd_pessoas + '</span></div>' : '') +
        '</div>' +

        '<div class="step-title">Seus dados</div>' +

        '<div class="form-group"><label class="form-label">Nome completo *</label><input type="text" id="f-nome" class="form-input" value="' + escapeHtml(clienteExistente ? clienteExistente.nome_completo : '') + '" placeholder="Seu nome"></div>' +
        '<div class="form-group"><label class="form-label">Telefone WhatsApp *</label><input type="tel" id="f-tel" class="form-input" inputmode="numeric" value="' + (clienteExistente && clienteExistente.telefone ? '(' + clienteExistente.telefone.slice(0,2) + ') ' + clienteExistente.telefone.slice(2,7) + '-' + clienteExistente.telefone.slice(7) : '') + '" placeholder="(43) 99999-9999"></div>' +
        '<div class="form-group"><label class="form-label">CPF ' + (modo === 'convite' ? '*' : '') + '</label><input type="tel" id="f-cpf" class="form-input" inputmode="numeric" value="' + (clienteExistente && clienteExistente.cpf ? fmtCpf(clienteExistente.cpf) : '') + '" placeholder="000.000.000-00"></div>' +
        '<div class="form-group"><label class="form-label">Instagram</label><input type="text" id="f-ig" class="form-input" value="' + escapeHtml(clienteExistente && clienteExistente.instagram ? clienteExistente.instagram : '') + '" placeholder="@seuusuario"></div>' +

        (modo === 'reserva' ? '<div class="form-group"><label class="form-label">Observações</label><textarea id="f-obs" class="form-textarea" placeholder="Aniversário, alergias, mesa de canto..."></textarea></div>' : '') +

        avisoBilhete +

        '<button type="button" class="btn btn-primary btn-block" id="btn-confirmar" style="margin-top:var(--space-md);">' + (modo === 'convite' ? '🎟️ Confirmar Presença' : '✓ Confirmar Reserva') + '</button>';

      aplicarMascaraTel(document.getElementById('f-tel'));
      aplicarMascaraCPF(document.getElementById('f-cpf'));
      document.getElementById('btn-confirmar').addEventListener('click', salvar);
    }

    async function salvar() {
      try {
        var nome = document.getElementById('f-nome').value.trim();
        var tel = document.getElementById('f-tel').value.replace(/\D/g, '');
        var cpf = document.getElementById('f-cpf').value.replace(/\D/g, '');
        var ig = document.getElementById('f-ig').value.trim();
        var obsEl = document.getElementById('f-obs');
        var obs = obsEl ? obsEl.value.trim() : '';

        if (!nome || nome.length < 3) { toast('Nome obrigatório', 'error'); return; }
        if (!tel || tel.length < 10) { toast('Telefone inválido', 'error'); return; }
        if (modo === 'convite' && !cpf) { toast('CPF obrigatório pra convite', 'error'); return; }
        if (cpf && cpf.length !== 11) { toast('CPF inválido', 'error'); return; }

        var qtd = (modo === 'convite') ? 1 : (dados.qtd_pessoas || 1);

        var btn = document.getElementById('btn-confirmar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;display:inline-block;vertical-align:middle;"></span> Salvando...';

        var tenantId = dados.tenant_id;

        var clienteId = null;
        if (cpf) {
          var pc = await sb.from('clientes').select('id').eq('tenant_id', tenantId).eq('cpf', cpf).maybeSingle();
          if (pc.data) clienteId = pc.data.id;
        }
        if (!clienteId) {
          var pt = await sb.from('clientes').select('id').eq('tenant_id', tenantId).eq('telefone', tel).maybeSingle();
          if (pt.data) clienteId = pt.data.id;
        }

        if (!clienteId) {
          var novoCliente = await sb.from('clientes').insert({
            tenant_id: tenantId,
            nome_completo: nome,
            telefone: tel,
            cpf: cpf || null,
            instagram: ig || null,
            origem: modo === 'convite' ? 'convite' : 'manual'
          }).select('id').maybeSingle();
          if (novoCliente.error) {
            if (novoCliente.error.code === '23505') {
              var retry = cpf
                ? await sb.from('clientes').select('id').eq('tenant_id', tenantId).eq('cpf', cpf).maybeSingle()
                : await sb.from('clientes').select('id').eq('tenant_id', tenantId).eq('telefone', tel).maybeSingle();
              if (retry.data) clienteId = retry.data.id;
              else throw new Error('Cliente já existe mas não foi possível recuperar');
            } else { throw new Error(novoCliente.error.message); }
          } else { clienteId = novoCliente.data.id; }
        } else {
          await sb.from('clientes').update({
            nome_completo: nome,
            telefone: tel,
            cpf: cpf || null,
            instagram: ig || null
          }).eq('id', clienteId);
        }

        if (modo === 'reserva') {
          var upd = await sb.from('reservas').update({
            cliente_id: clienteId,
            qtd_pessoas: qtd,
            status: 'confirmada',
            observacoes: obs || null
          }).eq('id', dados.id);
          if (upd.error) throw new Error(upd.error.message);
        } else {
          var novaReserva = await sb.from('reservas').insert({
            tenant_id: tenantId,
            cliente_id: clienteId,
            data: loteInfo.data_evento,
            qtd_pessoas: 1,
            status: 'confirmada',
            origem: 'convite',
            evento_id: loteInfo.evento_id || null,
            lote_id: loteInfo.id,
            convite_id: dados.id,
            criada_por: loteInfo.criado_por || null,
            confirmada_por: loteInfo.criado_por || null
          }).select('id').maybeSingle();
          if (novaReserva.error) throw new Error(novaReserva.error.message);

          await sb.from('convites').update({
            status: 'usado',
            reserva_id: novaReserva.data.id,
            usado_em: new Date().toISOString()
          }).eq('id', dados.id);

          var l = await sb.from('lotes').select('usados').eq('id', loteInfo.id).maybeSingle();
          if (l.data) {
            await sb.from('lotes').update({ usados: (l.data.usados || 0) + 1 }).eq('id', loteInfo.id);
          }
        }

        mostrarSucesso(nome, qtd);
      } catch(err) {
        toast('Erro: ' + err.message, 'error');
        var btn = document.getElementById('btn-confirmar');
        if (btn) { btn.disabled = false; btn.innerHTML = (modo === 'convite' ? '🎟️ Confirmar Presença' : '✓ Confirmar Reserva'); }
      }
    }

    function mostrarSucesso(nome, qtd) {
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('sucesso').style.display = '';
      var dataEvento = modo === 'reserva' ? dados.data : loteInfo.data_evento;
      var msg = nome.split(' ')[0] + (modo === 'convite' ? ', sua presença tá confirmada! 🍻' : ', sua reserva tá confirmada!');
      document.getElementById('sucesso-msg').textContent = msg;

      var info = '<div class="info-row"><span class="info-l">📅 Data</span><span class="info-v">' + fmtData(dataEvento) + '</span></div>';
      if (modo === 'reserva') info += '<div class="info-row"><span class="info-l">👥 Pessoas</span><span class="info-v">' + qtd + '</span></div>';
      if (eventoInfo) info += '<div class="info-row"><span class="info-l">🎤 Evento</span><span class="info-v">' + escapeHtml(eventoInfo.nome) + '</span></div>';
      if (modo === 'convite') info += '<div class="info-row"><span class="info-l">🎟️ Convite</span><span class="info-v">#' + dados.numero_convite + '</span></div>';
      document.getElementById('sucesso-info').innerHTML = info;

      // Bilhete digital pra convites
      if (modo === 'convite') {
        var url = urlBilhete();
        document.getElementById('sucesso-bilhete').innerHTML =
          '<div class="bilhete-success">' +
            '<div class="bilhete-success-titulo">🎫 SEU BILHETE DIGITAL</div>' +
            '<div class="bilhete-success-sub">Apresente esse bilhete na portaria pra entrar.<br>QR code único e pessoal.</div>' +
            '<a href="' + url + '" class="btn btn-gold btn-block" style="font-size:1rem;padding:14px;margin-bottom:var(--space-md);">🎫 Ver meu bilhete agora</a>' +
            '<div class="bilhete-link-box">' +
              '<div class="bilhete-link-l">📌 Salve esse link — você vai precisar</div>' +
              '<div class="bilhete-link-v">' + url + '</div>' +
            '</div>' +
          '</div>';
      }
    }

    validarToken();
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('invalido').style.display = '';
    document.getElementById('invalido-msg').textContent = 'Erro fatal: ' + err.message;
  }
})();
  </script>
</body>
</html>
